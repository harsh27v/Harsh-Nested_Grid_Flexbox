<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Dr. Nut Soda</title>
        <link rel="stylesheet" href="css/grid.css">
        <link rel="stylesheet" href="css/main.css">
    </head>
    <body>
        <header class="hero">
            <div class="grid-con hero-layout">
                <div class="hero-content col-span-4 m-col-span-6 l-col-span-6">
                    <p class="hero-tag">Premium Craft Soda</p>
                    <h1>Dr. Nut Soda</h1>
                    <p class="hero-description">
                        Experience the bold flavor of Dr. Nut Soda. Crafted with
                        natural ingredients and a unique roasted nut infusion,
                        this refreshing drink delivers a smooth taste that
                        stands out from ordinary sodas.
                    </p>
                    <div class="hero-buttons">
                        <a href="#" class="btn primary">Buy Now</a>
                        <a href="#" class="btn secondary">Discover Flavor</a>
                    </div>
                </div>
                <div class="hero-image col-span-4 m-col-span-6 l-col-span-6">
                    <picture>
                        <source media="(min-width:1200px)" srcset="images/hero.jpg">
                        <source media="(min-width:768px)" srcset="images/hero.jpg">
                        <img src="images/hero.jpg" alt="Dr Nut Soda Bottle">
                    </picture>
                </div>
            </div>
        </header>

    </html>
